name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.pdf"
      - "*.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.pdf"
      - "*.md"

jobs:  
  test_pc_one:
    name: system tests | hardware | pc-one
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt install -y  make gcc-riscv64-unknown-elf iverilog python3 python3-pip

      - name: Install nox
        run: pip install nox cocotb pytest

      - name: Test pc-one
        run: nox -s test_pc_one
  
  test_fpga_bios_uart:
    name: system tests | hardware | UART | FPGA | BIOS test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt install -y  make gcc-riscv64-unknown-elf iverilog python3 python3-pip

      - name: Install nox
        run: pip install nox cocotb pytest
      
      - name: FPGA | digilent_nexys3
        run: nox -s test_fpga_bios_uart

  test_memories:
    name: unit tests| hardware | memories 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt install -y make iverilog python3 python3-pip

      - name: Install nox
        run: pip install nox cocotb pytest

      - name: Test RAM
        run: nox -s test_ram

        